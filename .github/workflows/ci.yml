name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test_and_scan:
    name: Install and SonarQube scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if present)
        run: npm test || echo "No test script defined, skipping tests"

      - name: SonarQube scan
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_HOST_URL" ] || [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_HOST_URL or SONAR_TOKEN not set - skipping SonarQube scan"
            exit 0
          fi
          docker run --rm \
            -e SONAR_HOST_URL="$SONAR_HOST_URL" \
            -e SONAR_TOKEN="$SONAR_TOKEN" \
            -v "$PWD":/usr/src \
            -w /usr/src \
            sonarsource/sonar-scanner-cli \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.sources=. \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.login="$SONAR_TOKEN"

  build_and_push:
    name: Build and push Docker image
    needs: test_and_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/finalhostel:latest,${{ secrets.DOCKERHUB_USERNAME }}/finalhostel:${{ github.sha }}

  run_container:
    name: Run container (smoke test)
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Run pushed image and smoke-test
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/finalhostel:${{ github.sha }}
        run: |
          if [ -z "$IMAGE" ]; then
            echo "DOCKER image name not set; failing"
            exit 1
          fi
          docker pull "$IMAGE"
          docker run -d --name ci_smoke -p 3000:3000 "$IMAGE"
          # wait for the app to start
          for i in {1..15}; do
            if curl -sSf http://localhost:3000 >/dev/null; then
              echo "App responded on port 3000"
              break
            fi
            sleep 2
          done
          if ! curl -sSf http://localhost:3000 >/dev/null; then
            docker logs ci_smoke || true
            docker stop ci_smoke || true
            docker rm ci_smoke || true
            exit 1
          fi
          docker stop ci_smoke
          docker rm ci_smoke
