name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint_and_audit:
    name: Install, lint and security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if present)
        run: npm test || echo "No test script defined, skipping tests"

      - name: Install ESLint (if not present)
        run: |
          if ! grep -q "eslint" package.json; then
            npm i -D eslint || true
          fi

      - name: Run ESLint
        run: |
          if [ -f .eslintrc.json ] || grep -q "eslintConfig" package.json; then
            npx eslint . || true
          else
            echo "No ESLint config found; skipping lint"
          fi

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate || true

  build_and_push:
    name: Build and push Docker image
    needs: test_and_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        name: CI

        on:
          push:
            branches: [ main, master ]
          pull_request:
            branches: [ main, master ]

        jobs:
          ci:
            name: Lint → Test → Build → Push → Smoke-test
            runs-on: ubuntu-latest
            steps:
              - name: Checkout
                uses: actions/checkout@v4

              - name: Use Node.js
                uses: actions/setup-node@v4
                with:
                  node-version: 18

              - name: Install dependencies
                run: npm ci

              - name: Run tests (if present)
                run: npm test || echo "No test script defined, skipping tests"

              - name: Install ESLint (if not present)
                run: |
                  if ! grep -q "eslint" package.json; then
                    npm i -D eslint || true
                  fi

              - name: Run ESLint
                run: |
                  if [ -f .eslintrc.json ] || grep -q "eslintConfig" package.json; then
                    npx eslint . || true
                  else
                    echo "No ESLint config found; skipping lint"
                  fi

              - name: Run npm audit
                run: |
                  npm audit --audit-level=moderate || true

              - name: Log in to Docker Hub
                uses: docker/login-action@v2
                with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

              - name: Build and push image
                uses: docker/build-push-action@v4
                with:
                  context: .
                  push: true
                  tags: ${{ secrets.DOCKERHUB_USERNAME }}/finalhostel:latest,${{ secrets.DOCKERHUB_USERNAME }}/finalhostel:${{ github.sha }}

              - name: Smoke-test pushed image
                env:
                  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/finalhostel:${{ github.sha }}
                run: |
                  docker pull "$IMAGE"
                  docker run -d --name ci_smoke -p 3000:3000 "$IMAGE"
                  for i in {1..15}; do
                    if curl -sSf http://localhost:3000 >/dev/null; then
                      echo "App responded on port 3000"
                      break
                    fi
                    sleep 2
                  done
                  if ! curl -sSf http://localhost:3000 >/dev/null; then
                    docker logs ci_smoke || true
                    docker stop ci_smoke || true
                    docker rm ci_smoke || true
                    exit 1
                  fi
                  docker stop ci_smoke
                  docker rm ci_smoke
