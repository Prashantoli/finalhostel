

services:
  # MongoDB database
  mongodb:
    image: mongo:4.4
    container_name: nepal-hostel-db
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: nepal_hostel_finder
    volumes:
      - /opt/mongo-data:/data/db
    networks:
      - hostel-network

  # Nepal Hostel Finder App
  app:
    build: .
    container_name: nepal-hostel-app
    restart: always
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/nepal_hostel_finder
      - JWT_SECRET=nepal-hostel-finder-secret-key-docker
    depends_on:
      - mongodb
    networks:
      - hostel-network
    volumes:
      - .:/app
      - /app/node_modules
      - /opt/hostel-app/uploads:/app/uploads  
      - /opt/hostel-app/logs:/app/logs 
# Define volumes for data persistence
volumes:
  mongodb_data:

# Define networks
networks:
  hostel-network:
    driver: bridge
